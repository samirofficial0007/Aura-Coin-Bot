<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viral BD Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* টেলিগ্রাম থিম অনুযায়ী কালার সেটআপ */
        :root {
            --bg-color: #0e1621;
            --text-color: #ffffff;
            --sub-text: #8b96a3;
            --button-bg: linear-gradient(90deg, #2aabee, #229ed9);
            --card-bg: #17212b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            background-color: #1c2733;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(42, 171, 238, 0.3);
        }

        .icon-box svg {
            width: 40px;
            height: 40px;
            fill: #2aabee;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        p {
            color: var(--sub-text);
            font-size: 15px;
            line-height: 1.5;
            padding: 0 10px;
        }

        .info-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin: 25px 0;
            text-align: left;
            border: 1px solid #232e3c;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-item span {
            margin-right: 10px;
        }

        .enter-btn {
            background: var(--button-bg);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(34, 158, 217, 0.4);
        }

        .enter-btn:active {
            transform: scale(0.97);
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #536272;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>
        </div>

        <h1>আমাদের প্ল্যাটফর্মে স্বাগতম!</h1>
        <p>ভিডিওটি দেখতে এবং সেরা অভিজ্ঞতা পেতে নিচের বাটনে ক্লিক করুন।</p>

        <div class="info-card">
            <div class="info-item"><span>🎬</span> নতুন নতুন দেশি ও বিদেশি ভিডিও</div>
            <div class="info-item"><span>🔥</span> ট্রেন্ডিং ও এক্সক্লুসিভ কনটেন্ট</div>
            <div class="info-item"><span>🚀</span> খুব সহজ নিয়মে ভিডিও দেখার সুবিধা</div>
        </div>

        <button class="enter-btn" onclick="goToLink()">প্রবেশ করুন (Enter)</button>
    </div>

    <div class="footer-text">@viral_zone_bd_bot</div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজ
        const tg = window.Telegram.WebApp;
        tg.expand(); // অ্যাপটি ফুল স্ক্রিন করা
        tg.ready();

        function goToLink() {
            // হ্যাপটিক ফিডব্যাক (বাটনে ক্লিক করলে ফোন ভাইব্রেট করবে)
            tg.HapticFeedback.impactOccurred('medium');
            
            // তোর Adsterra Smartlink এখানে দেওয়া হয়েছে
            const smartLink = "https://www.profitablecpmratenetwork.com/gpwvau0su?key=ae6de91dc812e06c58974e2e5b3b9581"; 
            
            // লিংকটি ব্রাউজারে ওপেন করা
            tg.openLink(smartLink);
            
            // ইউজারের জন্য একটি অ্যালার্ট দেখানো
            tg.showAlert("আপনার ভিডিও লিংকটি প্রসেস হচ্ছে। দয়া করে ৫-১০ সেকেন্ড অপেক্ষা করুন...");
        }
    </script>
</body>
</html>
